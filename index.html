<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💜 Invitation</title>

<style>
body{
margin:0;
overflow:hidden;
font-family: Georgia, serif;
background:
url("tae.jpg") center center / cover no-repeat fixed;
color:white;
}

/* dark overlay */
body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:0;
}

/* screens */
.screen{
position:absolute;
z-index:2;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hidden{display:none;}

/* CARD STYLE (IMPORTANT) */
.card{
background:rgba(0,0,0,0.4);
backdrop-filter: blur(8px);
padding:25px 30px;
border-radius:18px;
max-width:700px;
box-shadow:0 0 25px rgba(168,85,247,0.3);
}

/* TEXT */
h1{
color:#0b0b0b;
text-shadow:
0 0 5px #a855f7,
0 0 15px #a855f7,
0 0 30px #7c3aed;
}
  
p{
color:#111111;
text-shadow:
0 0 6px #a855f7,
0 0 12px rgba(168,85,247,0.8);
}

/* BUTTONS */
button, a.button{
margin-top:20px;
padding:14px 30px;
border:none;
border-radius:30px;
cursor:pointer;
background:#7c3aed;
color:white;
font-size:16px;
text-decoration:none;
box-shadow:0 0 15px #7c3aed, 0 0 30px #a855f7;
transition:0.3s;
}

button:hover, a.button:hover{
transform:scale(1.05);
}

/* hearts */
.heart{
position:absolute;
color:#d946ef;
font-size:18px;
animation:fall linear forwards;
}

@keyframes fall{
0%{transform:translateY(-10vh);opacity:1;}
100%{transform:translateY(110vh);opacity:0;}
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<!-- SCREEN 1 -->
<div class="screen" id="s1">
<div class="card">
<h1>💜</h1>
<p>с днём рождения, Муняню 🤍</p>
<button onclick="next1()">дальше</button>
</div>
</div>

<!-- SCREEN 2 -->
<div class="screen hidden" id="s2">
<div class="card">
<p>
пусть у тебя всё складывается так, как ты хочешь, и жизнь радует каждый день.<br><br>
люблю и очень ценю тебя!
</p>
<button onclick="next2()">ещё</button>
</div>
</div>

<!-- SCREEN 3 -->
<div class="screen hidden" id="s3">
<div class="card">
<h1>🎫</h1>

<p>твоя чупапи 🫶🏻🤍</p>

<h1>Концерт Валерия Меладзе</h1>

<p>Этот вечер уже ждёт тебя 💜</p>

<a class="button" href="ticket.pdf" target="_blank">
Открыть билет (PDF)
</a>
</div>
</div>

<script>

function next1(){
document.getElementById("s1").classList.add("hidden");
document.getElementById("s2").classList.remove("hidden");
startMusic();
}

function next2(){
document.getElementById("s2").classList.add("hidden");
document.getElementById("s3").classList.remove("hidden");
}

/* music */
function startMusic(){
const m=document.getElementById("music");
m.volume=0.5;
m.play();
}

/* hearts */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💜";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(3+Math.random()*3)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},250);

</script>

</body>
</html>
