<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💜 Для тебя</title>

<style>
body{
margin:0;
overflow:hidden;
background:
linear-gradient(rgba(0,0,0,0.80), rgba(0,0,0,0.92)),
url("tae.jpg") center center / cover no-repeat fixed;
font-family: Georgia, serif;
color:#ffffff;
}

.screen{
height:100vh;
width:100%;
position:absolute;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hidden{display:none;}

h1{
color:#ffffff;
text-shadow:
0 0 5px #a855f7,
0 0 15px #a855f7,
0 0 30px #7c3aed;
font-size:46px;
}

p{
max-width:700px;
font-size:20px;
line-height:1.7;
color:#f3e8ff;
text-shadow:
0 0 6px #a855f7,
0 0 12px rgba(168,85,247,0.8);
}

button, a.button{
background:#7c3aed;
color:white;
border:none;
padding:14px 30px;
border-radius:30px;
cursor:pointer;
box-shadow:
0 0 10px #7c3aed,
0 0 25px #a855f7;
transition:0.3s;
}

button:hover, a.button:hover{
transform:scale(1.05);
box-shadow:
0 0 15px #a855f7,
0 0 40px #a855f7;
}

/* hearts */
.heart{
position:absolute;
color:#d946ef;
font-size:18px;
animation:fall linear forwards;
}

@keyframes fall{
0%{transform:translateY(-10vh);opacity:1;}
100%{transform:translateY(110vh);opacity:0;}
}

/* fade */
.fade{
animation:fadeIn 1.5s ease forwards;
opacity:0;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<!-- SCREEN 1 -->
<div class="screen" id="s1">
<h1 class="fade">💜</h1>
<p class="fade">с днём рождения, Муняню 🤍</p>
<button onclick="next1()">дальше</button>
</div>

<!-- SCREEN 2 -->
<div class="screen hidden" id="s2">
<p class="fade">
пусть у тебя всё складывается так, как ты хочешь, и жизнь радует каждый день.<br><br>
люблю и очень ценю тебя!
</p>
<button onclick="next2()">ещё</button>
</div>

<!-- SCREEN 3 -->
<div class="screen hidden" id="s3">

<h1>🎫</h1>

<p class="fade">твоя чупапи 🫶🏻🤍</p>

<h1>Концерт Валерия Меладзе</h1>

<p>Этот вечер уже ждёт тебя 💜</p>

<a class="button" href="ticket.pdf" target="_blank">
Открыть билет (PDF)
</a>

</div>

<script>

function next1(){
document.getElementById("s1").classList.add("hidden");
document.getElementById("s2").classList.remove("hidden");
startMusic();
}

function next2(){
document.getElementById("s2").classList.add("hidden");
document.getElementById("s3").classList.remove("hidden");
}

/* music */
function startMusic(){
const m=document.getElementById("music");
m.volume=0.5;
m.play();
}

/* hearts */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💜";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(3+Math.random()*3)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},250);

</script>

</body>
</html>
