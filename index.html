<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>💜 Invitation</title>

<style>

/* RESET */
html, body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
-webkit-text-size-adjust:100%;
font-family: Georgia, serif;
}

/* BACKGROUND */
body{
background:
url("tae.jpg") center center / cover no-repeat fixed;
color:white;
position:relative;
}

/* DARK OVERLAY */
body::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.78);
z-index:0;
}

/* SCREEN */
.screen{
position:absolute;
inset:0;
z-index:2;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
box-sizing:border-box;
height:100dvh;
}

/* HIDE */
.hidden{display:none;}

/* CARD */
.card{
width:92%;
max-width:700px;
background:rgba(0,0,0,0.45);
backdrop-filter: blur(10px);
padding:22px 20px;
border-radius:18px;
box-shadow:0 0 25px rgba(168,85,247,0.25);
}

/* TEXT */
h1{
font-size:clamp(28px, 6vw, 42px);
color:#ffffff;
text-shadow:
0 0 8px #a855f7,
0 0 18px #7c3aed,
0 0 35px #a855f7;
}

p{
font-size:clamp(16px, 4.5vw, 20px);
line-height:1.7;
color:#ffffff;
text-shadow:
0 0 6px #a855f7,
0 0 14px rgba(168,85,247,0.8);
}

/* BUTTON */
button, a.button{
margin-top:18px;
padding:14px 28px;
border:none;
border-radius:30px;
cursor:pointer;
background:#7c3aed;
color:white;
font-size:16px;
text-decoration:none;
box-shadow:
0 0 15px #7c3aed,
0 0 30px #a855f7;
transition:0.3s;
}

button:active, a.button:active{
transform:scale(0.97);
}

/* HEARTS */
.heart{
position:absolute;
color:#d946ef;
font-size:18px;
animation:fall linear forwards;
z-index:1;
}

@keyframes fall{
0%{transform:translateY(-10vh);opacity:1;}
100%{transform:translateY(110vh);opacity:0;}
}

</style>
</head>

<body>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<!-- SCREEN 1 -->
<div class="screen" id="s1">
<div class="card">
<h1>💜</h1>
<p>с днём рождения, Муняню 🤍</p>
<button onclick="next1()">дальше</button>
</div>
</div>

<!-- SCREEN 2 -->
<div class="screen hidden" id="s2">
<div class="card">
<p>
пусть у тебя всё складывается так, как ты хочешь, и жизнь радует каждый день.<br><br>
люблю и очень ценю тебя!
</p>
<button onclick="next2()">ещё</button>
</div>
</div>

<!-- SCREEN 3 -->
<div class="screen hidden" id="s3">
<div class="card">

<h1>🎫</h1>

<p>твоя чупапи 🫶🏻🤍</p>

<h1>Концерт Валерия Меладзе</h1>

<p>Этот вечер уже ждёт тебя 💜</p>

<a class="button" href="ticket.pdf" target="_blank">
Открыть билет (PDF)
</a>

</div>
</div>

<script>

function next1(){
document.getElementById("s1").classList.add("hidden");
document.getElementById("s2").classList.remove("hidden");
startMusic();
}

function next2(){
document.getElementById("s2").classList.add("hidden");
document.getElementById("s3").classList.remove("hidden");
}

/* MUSIC */
function startMusic(){
const m=document.getElementById("music");
m.volume=0.5;
m.play();
}

/* HEARTS */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💜";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(3+Math.random()*3)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},250);

</script>

</body>
</html>
