<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>💜 Invitation</title>

<style>

html, body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
font-family: Georgia, serif;
-webkit-text-size-adjust:100%;
}

body{
background:
url("tae.jpg") center center / cover no-repeat fixed;
position:relative;
color:white;
}

/* overlay */
body::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.78);
z-index:0;
}

/* screen */
.screen{
position:absolute;
inset:0;
z-index:2;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
box-sizing:border-box;
height:100dvh;
}

.hidden{display:none;}

/* card */
.card{
width:92%;
max-width:700px;
background:rgba(0,0,0,0.6);
backdrop-filter: blur(12px);
padding:22px;
border-radius:18px;
box-shadow:0 0 25px rgba(168,85,247,0.25);
}

/* TEXT */
h1{
color:#fff;
font-size:clamp(28px, 6vw, 42px);
text-shadow:
0 0 10px #a855f7,
0 0 25px #7c3aed;
}

p{
color:#fff;
font-size:clamp(16px, 4.5vw, 20px);
line-height:1.7;
text-shadow:
0 0 6px #a855f7,
0 0 14px rgba(168,85,247,0.8);
}

/* BUTTON */
button, a.button{
margin-top:18px;
padding:14px 28px;
border:none;
border-radius:30px;
cursor:pointer;
background:#7c3aed;
color:white;
font-size:16px;
text-decoration:none;
box-shadow:0 0 15px #7c3aed, 0 0 30px #a855f7;
}

/* hearts */
.heart{
position:absolute;
color:#d946ef;
font-size:18px;
animation:fall linear forwards;
z-index:1;
}

@keyframes fall{
0%{transform:translateY(-10vh);opacity:1;}
100%{transform:translateY(110vh);opacity:0;}
}

</style>
</head>

<body>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<!-- SCREEN 1 -->
<div class="screen" id="s1">
<div class="card">
<h1>💜</h1>
<p id="t1"></p>
<button onclick="next1()">дальше</button>
</div>
</div>

<!-- SCREEN 2 -->
<div class="screen hidden" id="s2">
<div class="card">
<p id="t2"></p>
<button onclick="next2()">ещё</button>
</div>
</div>

<!-- SCREEN 3 -->
<div class="screen hidden" id="s3">
<div class="card">

<h1>🎫</h1>

<p id="t3"></p>

<h1>Концерт Валерия Меладзе</h1>

<p>Этот вечер уже ждёт тебя 💜</p>

<a class="button" href="ticket.pdf" target="_blank">
Открыть билет (PDF)
</a>

</div>
</div>

<script>

let i1=0, i2=0, i3=0;

const text1="с днём рождения, Муняню 🤍";
const text2="пусть у тебя всё складывается так, как ты хочешь, и жизнь радует каждый день. люблю и очень ценю тебя!";
const text3="твоя чупапи 🫶🏻🤍";

/* TYPEWRITER 1 */
function type1(){
if(i1<text1.length){
document.getElementById("t1").innerHTML+=text1.charAt(i1);
i1++;
setTimeout(type1,60);
}
}

/* TYPEWRITER 2 */
function type2(){
if(i2<text2.length){
document.getElementById("t2").innerHTML+=text2.charAt(i2);
i2++;
setTimeout(type2,40);
}
}

/* TYPEWRITER 3 */
function type3(){
if(i3<text3.length){
document.getElementById("t3").innerHTML+=text3.charAt(i3);
i3++;
setTimeout(type3,60);
}
}

/* NAV */
function next1(){
document.getElementById("s1").classList.add("hidden");
document.getElementById("s2").classList.remove("hidden");
startMusic();
type2();
}

function next2(){
document.getElementById("s2").classList.add("hidden");
document.getElementById("s3").classList.remove("hidden");
type3();
}

/* MUSIC */
function startMusic(){
const m=document.getElementById("music");
m.volume=0.5;
m.play();
}

/* HEARTS */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💜";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(3+Math.random()*3)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},250);

/* start first screen text */
window.onload=type1;

</script>

</body>
</html>
