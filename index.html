<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💜 Invitation</title>

<style>
body{
margin:0;
overflow:hidden;
background:
linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
url("tae.jpg") center center / cover no-repeat fixed;
font-family: Georgia, serif;
color:#c9a0ff;
}

.screen{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
position:absolute;
width:100%;
}

.hidden{display:none;}

h1{
color:#d7b3ff;
text-shadow:0 0 20px #a855f7;
font-size:40px;
}

p{
max-width:650px;
font-size:18px;
line-height:1.7;
color:#e9d5ff;
}

button{
margin-top:20px;
padding:14px 30px;
border:none;
border-radius:30px;
cursor:pointer;
font-size:16px;
background:#a855f7;
color:white;
box-shadow:0 0 15px #a855f7;
}

/* hearts */
.heart{
position:absolute;
color:#d946ef;
font-size:18px;
animation:fall linear forwards;
}

@keyframes fall{
0%{transform:translateY(-10vh);opacity:1;}
100%{transform:translateY(110vh);opacity:0;}
}

/* glow */
.glow{
text-shadow:0 0 25px #a855f7;
}

/* pdf button */
a.button{
display:inline-block;
margin-top:20px;
padding:14px 25px;
background:#7c3aed;
color:white;
border-radius:30px;
text-decoration:none;
box-shadow:0 0 20px #7c3aed;
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="screen" id="s1">
<h1 class="glow">💜</h1>
<p>
Иногда один человек превращает обычные дни в музыку.
</p>
<button onclick="next1()">Продолжить</button>
</div>

<div class="screen hidden" id="s2">
<p>
Я не буду долго говорить.
<br><br>
Я просто хочу, чтобы ты увидела это.
</p>
<button onclick="next2()">Дальше</button>
</div>

<div class="screen hidden" id="s3">
<h1 class="glow">🎫</h1>

<p>У нас есть один вечер.</p>

<h1>Концерт Валерия Меладзе</h1>

<p>И я хочу провести его с тобой 💜</p>

<a class="button" href="ticket.pdf" target="_blank">
Открыть билет (PDF)
</a>
</div>

<script>
function next1(){
document.getElementById("s1").classList.add("hidden");
document.getElementById("s2").classList.remove("hidden");
startMusic();
}

function next2(){
document.getElementById("s2").classList.add("hidden");
document.getElementById("s3").classList.remove("hidden");
}

function startMusic(){
const m=document.getElementById("music");
m.volume=0.5;
m.play();
}

/* hearts */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💜";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(3+Math.random()*3)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},250);
</script>

</body>
</html>
